<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Harmony & Contrast Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1a1a1a;background:#f5f3ef;min-height:100vh;padding:1rem 0}
.wrap{padding:1rem;max-width:480px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px;text-align:center}
.sub{font-size:13px;color:#666;margin-bottom:1.25rem;text-align:center}
#wheel-wrap{position:relative;width:100%;aspect-ratio:1;max-width:280px;margin:0 auto 1.25rem;cursor:crosshair}
#wheel{width:100%;height:100%;border-radius:50%;display:block}
.dot{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.harmony-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.htab{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;transition:all .15s}
.htab.active{background:#1a1a1a;color:#fff;border-color:transparent}
.sl-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.sl-row label{font-size:12px;color:#666;width:24px;flex-shrink:0}
.sl-row input[type=range]{flex:1;accent-color:#1a1a1a}
.sl-row span{font-size:12px;width:30px;text-align:right;color:#666}
.swatches{display:grid;gap:8px;margin-bottom:1.25rem}
.swatch{border-radius:8px;border:0.5px solid #ddd;overflow:hidden;background:#fff}
.swatch-color{height:56px;width:100%}
.swatch-info{padding:6px 10px;display:flex;align-items:center;justify-content:space-between}
.swatch-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.swatch-hex{font-size:13px;font-family:monospace;color:#1a1a1a}
.copy-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer}
.copy-btn:active{background:#eee}
.wcag-row{display:flex;gap:8px;margin-bottom:1.25rem}
.wcag-card{flex:1;border-radius:8px;border:0.5px solid #ddd;padding:8px 10px;background:#eee}
.wcag-card .ratio{font-size:18px;font-weight:500}
.wcag-card .wcag-label{font-size:11px;color:#666}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin-left:4px;vertical-align:middle}
.pass{background:#c0dd97;color:#27500a}
.fail{background:#f09595;color:#791f1f}
.preview-box{border-radius:8px;padding:1rem;margin-bottom:1rem}
.preview-box p{font-size:14px;line-height:1.6;margin-bottom:6px}
.preview-box .preview-small{font-size:11px;opacity:.8}
.hex-input-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.hex-input-row label{font-size:13px;color:#666}
.hex-input-row input[type=text]{font-family:monospace;font-size:13px;width:100px;padding:5px 8px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.export-btn{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;margin-right:6px;margin-bottom:8px}
.export-btn:active{background:#eee}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:6px}
.cb-toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.cbtog{font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer}
.cbtog.active{background:#dbeafe;color:#1e40af;border-color:transparent}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:6px 16px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.export-area{font-family:monospace;font-size:12px;width:100%;border-radius:8px;border:0.5px solid #ccc;background:#eee;color:#1a1a1a;padding:10px;resize:vertical;display:none;min-height:80px;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎨 Color Harmony &amp; Contrast</h1>
  <p class="sub">Find your perfect palette — pick, explore, export</p>

  <div class="section-label">Pick a color</div>
  <div id="wheel-wrap">
    <canvas id="wheel"></canvas>
  </div>

  <div class="sl-row">
    <label>S</label>
    <input type="range" id="sl-s" min="0" max="100" value="80" step="1">
    <span id="sl-s-out">80</span>
  </div>
  <div class="sl-row">
    <label>L</label>
    <input type="range" id="sl-l" min="10" max="90" value="50" step="1">
    <span id="sl-l-out">50</span>
  </div>

  <div class="hex-input-row">
    <label>Hex</label>
    <input type="text" id="hex-in" value="#4040FF" maxlength="7">
  </div>

  <div class="section-label">Harmony type</div>
  <div class="harmony-tabs">
    <button class="htab active" data-mode="complementary">Complementary</button>
    <button class="htab" data-mode="triadic">Triadic</button>
    <button class="htab" data-mode="tetradic">Tetradic</button>
    <button class="htab" data-mode="analogous">Analogous</button>
    <button class="htab" data-mode="split">Split-comp</button>
    <button class="htab" data-mode="mono">Monochromatic</button>
  </div>

  <div id="swatches" class="swatches"></div>

  <div class="section-label">Contrast preview</div>
  <div id="preview-box" class="preview-box">
    <p id="preview-text">The quick brown fox jumps over the lazy dog.</p>
    <p class="preview-small" id="preview-small">Small text (11px) — harder to read</p>
  </div>
  <div class="wcag-row">
    <div class="wcag-card">
      <div class="wcag-label">Contrast ratio</div>
      <div class="ratio" id="wcag-ratio">—</div>
    </div>
    <div class="wcag-card">
      <div class="wcag-label">AA normal <span class="badge" id="aa-badge">—</span></div>
      <div class="wcag-label" style="margin-top:4px">AAA <span class="badge" id="aaa-badge">—</span></div>
    </div>
  </div>

  <div class="section-label">Color vision simulation</div>
  <div class="cb-toggle-row">
    <button class="cbtog active" data-cb="normal">Normal</button>
    <button class="cbtog" data-cb="deuteranopia">Deuteranopia</button>
    <button class="cbtog" data-cb="protanopia">Protanopia</button>
    <button class="cbtog" data-cb="tritanopia">Tritanopia</button>
    <button class="cbtog" data-cb="mono">Monochromacy</button>
  </div>

  <div class="section-label">Export</div>
  <div>
    <button class="export-btn" id="btn-css">CSS vars</button>
    <button class="export-btn" id="btn-json">JSON</button>
    <button class="export-btn" id="btn-tailwind">Tailwind</button>
    <button class="export-btn" id="btn-img">Copy all hex</button>
  </div>
  <textarea id="export-area" class="export-area" readonly></textarea>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const wrapEl = document.getElementById('wheel-wrap');
let hue = 240, sat = 80, lig = 50;
let mode = 'complementary';
let cbMode = 'normal';
let palette = [];

function resize(){
  const s = wrapEl.offsetWidth;
  canvas.width = s; canvas.height = s;
  drawWheel();
  renderDots();
}

function drawWheel(){
  const s = canvas.width, cx=s/2, cy=s/2, r=s/2-2;
  ctx.clearRect(0,0,s,s);
  for(let a=0;a<360;a++){
    const startAngle=(a-1)*Math.PI/180;
    const endAngle=(a+1)*Math.PI/180;
    for(let ri=0;ri<r;ri++){
      const t=ri/r;
      const lv=90-t*50;
      const sv=30+t*70;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,ri+1,startAngle,endAngle);
      ctx.closePath();
      ctx.fillStyle=`hsl(${a},${sv}%,${lv}%)`;
      ctx.fill();
    }
  }
}

function hslToXY(h,s,l,size){
  const r=(size/2-2)*((s/100)*0.8+0.15);
  const angle=(h-90)*Math.PI/180;
  return{x:size/2+r*Math.cos(angle),y:size/2+r*Math.sin(angle)};
}

function xyToHSL(x,y,size){
  const cx=size/2,cy=size/2;
  const dx=x-cx,dy=y-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const maxR=size/2-2;
  let angle=Math.atan2(dy,dx)*180/Math.PI+90;
  if(angle<0)angle+=360;
  const sv=Math.min(dist/maxR,1);
  const s=Math.round((sv-0.15)/0.8*100);
  return{h:Math.round(angle)%360,s:Math.max(0,Math.min(100,s)),l:lig};
}

function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const color=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*color).toString(16).padStart(2,'0')};
  return '#'+f(0)+f(8)+f(4);
}

function hexToHSL(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break}
    h/=6;
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function getHarmony(h,s,l,mode){
  switch(mode){
    case 'complementary':return[{h,s,l},{h:(h+180)%360,s,l}];
    case 'triadic':return[{h,s,l},{h:(h+120)%360,s,l},{h:(h+240)%360,s,l}];
    case 'tetradic':return[{h,s,l},{h:(h+90)%360,s,l},{h:(h+180)%360,s,l},{h:(h+270)%360,s,l}];
    case 'analogous':return[{h:(h-30+360)%360,s,l},{h,s,l},{h:(h+30)%360,s,l},{h:(h+60)%360,s,l}];
    case 'split':return[{h,s,l},{h:(h+150)%360,s,l},{h:(h+210)%360,s,l}];
    case 'mono':return[{h,s,l:Math.max(15,l-30)},{h,s,l:Math.max(20,l-15)},{h,s,l},{h,s,l:Math.min(80,l+15)},{h,s,l:Math.min(90,l+30)}];
    default:return[{h,s,l}];
  }
}

const LABELS={complementary:['Selected','Complement'],triadic:['Primary','Triadic 1','Triadic 2'],tetradic:['Primary','Tetradic 1','Tetradic 2','Tetradic 3'],analogous:['Analogous −30°','Selected','Analogous +30°','Analogous +60°'],split:['Primary','Split 1','Split 2'],mono:['Darkest','Dark','Base','Light','Lightest']};

function applyColorBlindness(hex,type){
  if(type==='normal')return hex;
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  let nr,ng,nb;
  if(type==='mono'){const v=0.299*r+0.587*g+0.114*b;return`#${Math.round(v*255).toString(16).padStart(2,'0').repeat(3)}`}
  if(type==='deuteranopia'){nr=0.625*r+0.375*g;ng=0.7*r+0.3*g;nb=0.3*g+0.7*b}
  else if(type==='protanopia'){nr=0.567*r+0.433*g;ng=0.558*r+0.442*g;nb=0.242*g+0.758*b}
  else if(type==='tritanopia'){nr=0.95*r+0.05*b;ng=g;nb=0.433*r+0.567*b}
  else{nr=r;ng=g;nb=b}
  const clamp=v=>Math.max(0,Math.min(255,Math.round(v*255))).toString(16).padStart(2,'0');
  return`#${clamp(nr)}${clamp(ng)}${clamp(nb)}`;
}

function relativeLum(hex){
  const c=parseInt(hex.slice(1,3),16)/255,d=parseInt(hex.slice(3,5),16)/255,e=parseInt(hex.slice(5,7),16)/255;
  const lin=v=>v<=0.04045?v/12.92:Math.pow((v+0.055)/1.055,2.4);
  return 0.2126*lin(c)+0.7152*lin(d)+0.0722*lin(e);
}

function contrastRatio(h1,h2){
  const l1=relativeLum(h1),l2=relativeLum(h2);
  const lighter=Math.max(l1,l2),darker=Math.min(l1,l2);
  return(lighter+0.05)/(darker+0.05);
}

function renderDots(){
  document.querySelectorAll('.dot').forEach(d=>d.remove());
  const s=canvas.width;
  palette.forEach((c,i)=>{
    const {x,y}=hslToXY(c.h,c.s,c.l,s);
    const dot=document.createElement('div');
    dot.className='dot';
    dot.style.left=x+'px';
    dot.style.top=y+'px';
    dot.style.background=hslToHex(c.h,c.s,c.l);
    dot.style.zIndex=i===0?10:5;
    dot.style.width=i===0?'22px':'16px';
    dot.style.height=i===0?'22px':'16px';
    wrapEl.appendChild(dot);
  });
}

function render(){
  palette=getHarmony(hue,sat,lig,mode);
  const labels=LABELS[mode]||[];
  const container=document.getElementById('swatches');
  const cols=palette.length<=2?'1fr 1fr':palette.length===3?'1fr 1fr 1fr':palette.length>=4?'repeat(2,1fr)':'1fr';
  container.style.gridTemplateColumns=cols;
  container.innerHTML='';
  palette.forEach((c,i)=>{
    const hex=hslToHex(c.h,c.s,c.l);
    const simHex=applyColorBlindness(hex,cbMode);
    const div=document.createElement('div');
    div.className='swatch';
    div.innerHTML=`<div class="swatch-color" style="background:${simHex}"></div><div class="swatch-info"><div><div class="swatch-label">${labels[i]||'Color '+(i+1)}</div><div class="swatch-hex">${hex}</div></div><button class="copy-btn" data-hex="${hex}">Copy</button></div>`;
    container.appendChild(div);
  });
  container.querySelectorAll('.copy-btn').forEach(b=>b.addEventListener('click',()=>copyHex(b.dataset.hex)));

  const baseHex=hslToHex(hue,sat,lig);
  const compHex=palette.length>1?hslToHex(palette[1].h,palette[1].s,palette[1].l):baseHex;
  const ratio=contrastRatio(baseHex,compHex);
  document.getElementById('wcag-ratio').textContent=ratio.toFixed(2)+':1';
  const aa=ratio>=4.5,aaa=ratio>=7;
  const aaBadge=document.getElementById('aa-badge');
  const aaaBadge=document.getElementById('aaa-badge');
  aaBadge.textContent=aa?'Pass':'Fail';aaBadge.className='badge '+(aa?'pass':'fail');
  aaaBadge.textContent=aaa?'Pass':'Fail';aaaBadge.className='badge '+(aaa?'pass':'fail');

  const pb=document.getElementById('preview-box');
  pb.style.background=applyColorBlindness(baseHex,cbMode);
  const textColor=relativeLum(baseHex)>0.4?'#1a1a1a':'#f5f5f5';
  pb.style.color=textColor;
  document.getElementById('hex-in').value=baseHex;
  renderDots();
}

function copyHex(hex){
  navigator.clipboard.writeText(hex).catch(()=>{});
  const t=document.getElementById('toast');
  t.textContent='Copied '+hex;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

wrapEl.addEventListener('click',e=>{
  const rect=wrapEl.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const y=(e.clientY-rect.top)*(canvas.height/rect.height);
  const cx=canvas.width/2,cy=canvas.height/2;
  const dist=Math.sqrt((x-cx)**2+(y-cy)**2);
  if(dist>canvas.width/2)return;
  const h=xyToHSL(x,y,canvas.width);
  hue=h.h;
  sat=Math.max(10,h.s);
  document.getElementById('sl-s').value=sat;
  document.getElementById('sl-s-out').textContent=sat;
  render();
});

document.getElementById('sl-s').addEventListener('input',e=>{sat=+e.target.value;document.getElementById('sl-s-out').textContent=sat;render()});
document.getElementById('sl-l').addEventListener('input',e=>{lig=+e.target.value;document.getElementById('sl-l-out').textContent=lig;render()});

document.querySelectorAll('.htab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.htab').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;render()}));

document.querySelectorAll('.cbtog').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.cbtog').forEach(x=>x.classList.remove('active'));b.classList.add('active');cbMode=b.dataset.cb;render()}));

document.getElementById('hex-in').addEventListener('change',e=>{
  let v=e.target.value.trim();
  if(!v.startsWith('#'))v='#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){const h=hexToHSL(v);hue=h.h;sat=h.s;lig=h.l;document.getElementById('sl-s').value=sat;document.getElementById('sl-s-out').textContent=sat;document.getElementById('sl-l').value=lig;document.getElementById('sl-l-out').textContent=lig;render()}
});

document.getElementById('btn-css').addEventListener('click',()=>{
  const p=getHarmony(hue,sat,lig,mode),labels=LABELS[mode]||[];
  const text=':root {\n'+p.map((c,i)=>`  --color-${(labels[i]||'color-'+(i+1)).toLowerCase().replace(/[^a-z0-9]+/g,'-')}: ${hslToHex(c.h,c.s,c.l)};`).join('\n')+'\n}';
  showExport(text);
});
document.getElementById('btn-json').addEventListener('click',()=>{
  const p=getHarmony(hue,sat,lig,mode),labels=LABELS[mode]||[];
  const obj={mode,colors:p.map((c,i)=>({name:labels[i]||'color-'+(i+1),hex:hslToHex(c.h,c.s,c.l),hsl:`hsl(${c.h},${c.s}%,${c.l}%)`}))};
  showExport(JSON.stringify(obj,null,2));
});
document.getElementById('btn-tailwind').addEventListener('click',()=>{
  const p=getHarmony(hue,sat,lig,mode),labels=LABELS[mode]||[];
  const lines=p.map((c,i)=>`'${(labels[i]||'color-'+(i+1)).toLowerCase().replace(/[^a-z0-9]+/g,'-')}': '${hslToHex(c.h,c.s,c.l)}'`);
  showExport('// tailwind.config.js colors:\n'+lines.join(',\n'));
});
document.getElementById('btn-img').addEventListener('click',()=>{
  const p=getHarmony(hue,sat,lig,mode);
  const text=p.map(c=>hslToHex(c.h,c.s,c.l)).join('  ');
  navigator.clipboard.writeText(text).catch(()=>{});
  showExport(text);
  const t=document.getElementById('toast');
  t.textContent='Hex codes copied!';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
});

function showExport(text){
  const a=document.getElementById('export-area');
  a.style.display='block';
  a.value=text;
  a.select();
}

window.addEventListener('resize',resize);
window.addEventListener('load',()=>{resize();render();});
</script>
</body>
</html>
